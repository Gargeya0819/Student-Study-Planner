image: python:3.13

stages:
  - lint
  - format
  - type_check
  - security
  - audit
  - test
  - coverage

before_script:
  - pip install -r requirements.txt
  - pip install ruff mypy pytest pytest-cov bandit pip-audit detect-secrets

lint:
  stage: lint
  script:
    - ruff check .

format:
  stage: format
  script:
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - mypy .

security:
  stage: security
  script:
    - bandit -r .

audit:
  stage: audit
  script:
    - pip-audit || true

test:
  stage: test
  script:
    - pytest

coverage:
  stage: coverage
  script:
    - pytest --cov=. --cov-report=xml
